server:
  port: 8080

spring:
  application:
    name: coldchain-monitor
  datasource:
    url: jdbc:postgresql://localhost:5432/coldchain_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

app:
  alert:
    cooldown-seconds: 300
  device:
    offline-timeout-seconds: 30

logging:
  level:
    com.coldchain: DEBUG
